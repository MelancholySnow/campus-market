<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册-校园二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f3f4f6;}
        .reg-box{width:400px;margin:60px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 15px #ddd;}
    </style>
</head>
<body>
    <div class="reg-box">
        <h3 class="text-center mb-4 text-success">用户注册</h3>
        <div class="mb-3">
            <input type="text" class="form-control" id="regUsername" placeholder="请输入学号（6-15位数字）">
            <div class="form-text text-muted">学号即为登录账号，需为纯数字</div>
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" id="regNickname" placeholder="请输入昵称">
            <div class="form-text text-muted">请勿使用不当词汇，最多20个字符</div>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" id="regPwd1" placeholder="请设置密码">
            <div class="form-text text-muted">8-32位，需包含大写字母、小写字母、数字、特殊字符中的至少三类</div>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" id="regPwd2" placeholder="再次确认密码">
        </div>
        <button class="btn btn-success w-100" id="regBtn">立即注册</button>
        <div id="errorTip" class="alert alert-danger mt-3" style="display:none;"></div>
        <div class="text-center mt-3">
            已有账号？<a href="login.html">去登录</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="common.js"></script>
<script>
    var tipEl = document.getElementById('errorTip');
    function showError(msg) {
        tipEl.textContent = msg;
        tipEl.style.display = 'block';
    }
    function hideError() {
        tipEl.style.display = 'none';
    }

    document.getElementById("regBtn").addEventListener("click", async function(){
        hideError();
        var username = document.getElementById("regUsername").value.trim();
        var nickname = document.getElementById("regNickname").value.trim();
        var pwd1 = document.getElementById("regPwd1").value.trim();
        var pwd2 = document.getElementById("regPwd2").value.trim();

        if(!username || !nickname || !pwd1){
            showError("请完善信息");
            return;
        }

        // 前端密码复杂度校验
        if(pwd1.length < 8 || pwd1.length > 32){
            showError("密码长度需为8-32位");
            return;
        }
        var cats = 0;
        if(/[A-Z]/.test(pwd1)) cats++;
        if(/[a-z]/.test(pwd1)) cats++;
        if(/[0-9]/.test(pwd1)) cats++;
        if(/[^A-Za-z0-9]/.test(pwd1)) cats++;
        if(cats < 3){
            showError("密码需包含大写字母、小写字母、数字、特殊字符中的至少三类");
            return;
        }
        if(pwd1 !== pwd2){
            showError("两次密码不一致");
            return;
        }

        try {
            var res = await axios.post("/api/register", {
                username: username,
                nickname: nickname,
                password: pwd1
            });

            if(res.data.code === 200){
                alert("注册成功，请登录");
                window.location.href = "login.html";
            } else {
                showError(res.data.msg || "注册失败");
            }
        } catch(e) {
            var errMsg = e.userMessage;
            if (!errMsg && e.response && e.response.data && e.response.data.msg) {
                errMsg = e.response.data.msg;
            }
            if (!errMsg) {
                errMsg = "网络错误，请确认后端已启动";
            }
            console.error("注册请求失败:", e);
            showError(errMsg);
        }
    })
</script>
</body>
</html>
