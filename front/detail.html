<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商品详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#198754;">
    <div class="container">
        <a class="navbar-brand" href="index.html">校园二手交易平台</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
            <li class="nav-item"><a class="nav-link" href="publish.html">发布闲置</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">购物车</a></li>
            <li class="nav-item"><a class="nav-link" href="order.html">我的订单</a></li>
            <li class="nav-item"><a class="nav-link" href="user.html">个人中心</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <img id="goodsImg" src="" class="w-100 rounded">
        </div>
        <div class="col-md-6">
            <h3 id="goodsName">加载中...</h3>
            <p id="goodsPrice" class="text-danger fs-3 mt-3">¥0.00</p>
            
            <!-- 发表时间（发布时间） -->
            <p><span class="text-muted">发布时间：</span><span id="goodsCreateTime">--</span></p>
            
            <p><span class="text-muted">卖家：</span><span id="goodsAuthor">--</span></p>
            
            <p><span class="text-muted">库存：</span><span id="goodsStock" class="badge bg-secondary">--</span></p>
            
            <hr>
            <h5>商品描述</h5>
            <p id="goodsDesc">--</p>

            <div class="mt-4">
                <button id="collectBtn" class="btn btn-outline-success me-3">❤️ 加入收藏</button>
                <button id="cartBtn" class="btn btn-success me-3">🛒 加入购物车</button>
                <button id="chatBtn" class="btn btn-danger">💬 立即私聊</button>
            </div>
        </div>
    </div>
</div>

<!-- 私聊弹窗 -->
<div class="modal fade" id="chatModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#198754;color:#fff;">
        <h5 class="modal-title">💬 私聊 <span id="chatSellerName"></span></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2 text-muted small">关联商品：<span id="chatGoodsName"></span></div>
        <textarea id="chatContent" class="form-control mb-3" rows="4" placeholder="请输入你想对卖家说的话..."></textarea>
        <button id="sendMsgBtn" class="btn btn-success w-100">发送消息</button>
      </div>
    </div>
  </div>
</div>

<!-- 先引入 axios，再引入 common.js，然后是 Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 保存当前商品详情（含卖家userId）
let currentGoods = null;

// 获取商品ID
function getUrlId(){
    let url = location.search;
    if(url.indexOf("id=")!==-1){
        return url.split("id=")[1];
    }
    return null;
}

// 页面加载
async function loadDetail(){
    let id = getUrlId();
    if(!id) return;

    // 复用 common.js 的 getGoodsDetail 方法
    let goods = await getGoodsDetail(id);
    if(!goods) {
        alert("商品不存在或已下架");
        return;
    }

    // 赋值到页面
    document.getElementById("goodsName").innerText = goods.name || "未命名";
    document.getElementById("goodsPrice").innerText = "¥" + (goods.price || 0.00);
    // 格式化时间
    document.getElementById("goodsCreateTime").innerText = goods.createTime || "未知";
    document.getElementById("goodsAuthor").innerText = goods.author || "匿名卖家";
    document.getElementById("goodsDesc").innerText = goods.description || "无描述";
    // 库存数量
    let stock = goods.stock;
    let stockEl = document.getElementById("goodsStock");
    stockEl.innerText = (stock !== undefined && stock !== null) ? stock + " 件" : "未知";
    if (stock > 0) {
        stockEl.className = "badge bg-success";
    } else if (stock === 0) {
        stockEl.className = "badge bg-danger";
        stockEl.innerText = "已售罄";
    }
    // 处理商品图片（默认图兜底）
    document.getElementById("goodsImg").src = resolveImgUrl(goods.img) || "https://placeholder.pics/svg/300x200/EEEEEE/999999/暂无图片";

    // 保存商品详情供私聊使用
    currentGoods = goods;

    // 更新收藏按钮状态 + 处理自己的商品
    updateCollectBtn();
    updateOwnGoodsUI();
}

// 更新收藏按钮状态
async function updateCollectBtn(){
    if(!currentUser || !currentGoods) return;
    let collected = await checkCollectStatus(currentUser.id, currentGoods.id);
    let btn = document.getElementById("collectBtn");
    if(collected){
        btn.innerHTML = '❤️ 已收藏（点击取消）';
        btn.classList.remove('btn-outline-success');
        btn.classList.add('btn-outline-danger');
    } else {
        btn.innerHTML = '❤️ 加入收藏';
        btn.classList.remove('btn-outline-danger');
        btn.classList.add('btn-outline-success');
    }
}

// 如果是自己的商品，隐藏购物车和收藏按钮
function updateOwnGoodsUI(){
    if(!currentUser || !currentGoods) return;
    if(currentUser.id == currentGoods.userId){
        document.getElementById("collectBtn").style.display = 'none';
        document.getElementById("cartBtn").style.display = 'none';
        document.getElementById("chatBtn").style.display = 'none';
        let tip = document.createElement('div');
        tip.className = 'alert alert-warning mt-2';
        tip.innerText = '这是您发布的商品，不能操作自己的商品';
        let btnGroup = document.querySelector('.mt-4');
        if(btnGroup && !document.getElementById('ownGoodsTip')){
            tip.id = 'ownGoodsTip';
            btnGroup.after(tip);
        }
    }
}

// 收藏切换（收藏/取消收藏）
async function toggleCollect(goodsId){
    if(!currentUser){
        alert("请先登录！");
        window.location.href = "login.html";
        return;
    }
    let collected = await checkCollectStatus(currentUser.id, goodsId);
    if(collected){
        await cancelCollect(currentUser.id, goodsId);
    } else {
        await addToCollect(goodsId);
    }
    updateCollectBtn();
}

// 绑定按钮事件
function bindEvents() {
    const goodsId = getUrlId();
    if(!goodsId) return;

    // 加入收藏（切换模式）
    document.getElementById("collectBtn").addEventListener('click', () => {
        toggleCollect(goodsId);
    });

    // 加入购物车
    document.getElementById("cartBtn").addEventListener('click', () => {
        addToCart(goodsId);
    });

    // 立即私聊 —— 弹出私聊弹窗
    document.getElementById("chatBtn").addEventListener('click', () => {
        if(!currentUser){
            alert("请先登录！");
            window.location.href = "login.html";
            return;
        }
        if(!currentGoods){
            alert("商品信息加载中，请稍后再试");
            return;
        }
        if(currentUser.id == currentGoods.userId){
            alert("不能给自己发消息哦~");
            return;
        }
        // 填充弹窗信息
        document.getElementById("chatSellerName").innerText = currentGoods.author || "卖家";
        document.getElementById("chatGoodsName").innerText = currentGoods.name || "";
        document.getElementById("chatContent").value = "";
        // 显示弹窗
        new bootstrap.Modal(document.getElementById("chatModal")).show();
    });

    // 发送消息按钮
    document.getElementById("sendMsgBtn").addEventListener('click', async () => {
        let content = document.getElementById("chatContent").value.trim();
        if(!content){
            alert("请输入消息内容");
            return;
        }
        let data = {
            fromUserId: currentUser.id,
            toUserId: currentGoods.userId,
            content: content,
            goodsId: currentGoods.id
        };
        let res = await sendMessage(data);
        alert(res.msg);
        if(res.code === 200){
            // 关闭弹窗
            bootstrap.Modal.getInstance(document.getElementById("chatModal")).hide();
        }
    });
}

// 页面加载完成后执行
window.onload = async function() {
    await loadDetail();
    bindEvents();
};
</script>
</body>
</html>
