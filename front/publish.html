<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布闲置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .pub-box{max-width:700px;margin:50px auto;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#198754;">
    <div class="container">
        <a class="navbar-brand" href="index.html">校园二手交易平台</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
            <li class="nav-item"><a class="nav-link active" href="publish.html">发布闲置</a></li>
            <li class="nav-item"><a class="nav-link" href="cart.html">购物车</a></li>
            <li class="nav-item"><a class="nav-link" href="order.html">我的订单</a></li>
            <li class="nav-item"><a class="nav-link" href="user.html">个人中心</a></li>
        </ul>
    </div>
</nav>

<div class="pub-box">
    <h4 class="mb-4 text-center">发布我的闲置物品</h4>
    <div class="mb-3">
        <label class="form-label">商品名称</label>
        <input type="text" class="form-control" id="goodsName" placeholder="请填写商品名称">
    </div>
    <div class="mb-3">
        <label class="form-label">所属分类</label>
        <select class="form-select" id="goodsCategory">
            <option>图书教材</option>
            <option>数码产品</option>
            <option>生活用品</option>
            <option>衣物鞋帽</option>
            <option>运动器材</option>
            <option>其他闲置</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">售卖价格</label>
        <input type="number" class="form-control" id="goodsPrice" placeholder="请输入价格（支持小数，如9.9）" min="0.01" step="0.01">
    </div>
    <div class="mb-3">
        <label class="form-label">库存数量</label>
        <input type="number" class="form-control" id="goodsStock" placeholder="请输入库存数量" value="1" min="1" max="9999">
    </div>
    <div class="mb-3">
        <label class="form-label">商品图片</label>
        <input type="file" class="form-control" id="goodsImgFile" accept="image/*">
        <div class="form-text">支持 png/jpg/jpeg/gif/webp，最大5MB。也可直接填写图片链接：</div>
        <input type="text" class="form-control mt-1" id="goodsImgUrl" placeholder="或输入图片网络地址（二选一，上传优先）">
    </div>
    <div class="mb-3">
        <label class="form-label">商品描述</label>
        <textarea class="form-control" id="goodsDesc" rows="5" placeholder="详细描述物品成色、使用时长、可议价等"></textarea>
    </div>
    <button class="btn btn-success w-100" id="publishBtn">立即发布</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="common.js"></script>
<script>
    // 没登录强制跳登录
    window.onload = function(){
        if(!currentUser){
            alert("请先登录");
            window.location.href = "login.html";
        }
    }

    document.getElementById("publishBtn").addEventListener("click",async function(){
        let name = document.getElementById("goodsName").value.trim();
        let category = document.getElementById("goodsCategory").value;
        let price = document.getElementById("goodsPrice").value.trim();
        let stock = document.getElementById("goodsStock").value.trim();
        let desc = document.getElementById("goodsDesc").value.trim();
        let imgFile = document.getElementById("goodsImgFile").files[0];
        let imgUrl = document.getElementById("goodsImgUrl").value.trim();

        if(!name || !price || !desc){
            alert("请完善商品名称、价格和描述");
            return;
        }

        // 价格校验
        let priceNum = parseFloat(price);
        if(isNaN(priceNum) || priceNum <= 0){
            alert("价格必须为大于0的数字");
            return;
        }
        priceNum = Math.round(priceNum * 100) / 100; // 保留两位小数

        // 库存校验
        let stockNum = parseInt(stock);
        if(isNaN(stockNum) || stockNum < 1){
            stockNum = 1;
        }

        // 图片处理：上传优先，其次外链，最后默认图
        let finalImg = imgUrl || "https://picsum.photos/400/400?random=" + Math.random();
        if(imgFile){
            document.getElementById("publishBtn").disabled = true;
            document.getElementById("publishBtn").innerText = "图片上传中...";
            let uploadRes = await uploadImage(imgFile);
            document.getElementById("publishBtn").disabled = false;
            document.getElementById("publishBtn").innerText = "立即发布";
            if(uploadRes.code === 200){
                finalImg = uploadRes.data.url;
            } else {
                alert("图片上传失败: " + uploadRes.msg);
                return;
            }
        } else if(!imgUrl){
            // 没上传也没填链接，使用默认随机图
            finalImg = "https://picsum.photos/400/400?random=" + Math.random();
        }

        let data = {
            name: name,
            category: category,
            price: priceNum,
            stock: stockNum,
            img: finalImg,
            description: desc,
            userId: currentUser.id,
            author: currentUser.nickname
        };

        let res = await publishGoods(data);
        if(res.code === 200){
            alert("发布成功！");
            window.location.href = "user.html";
        }else{
            alert(res.msg);
        }
    })
</script>
</body>
</html>
