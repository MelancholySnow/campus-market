<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录-校园二手交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f3f4f6;}
        .login-box{width:400px;margin:80px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 15px #ddd;}
    </style>
</head>
<body>
    <div class="login-box">
        <h3 class="text-center mb-4 text-success">用户登录</h3>
        <div class="mb-3">
            <input type="text" id="usernameInput" class="form-control" placeholder="请输入账号">
        </div>
        <div class="mb-3">
            <input type="password" id="passwordInput" class="form-control" placeholder="请输入密码">
        </div>
        <button id="loginBtn" class="btn btn-success w-100">立即登录</button>
        <div id="errorTip" class="alert alert-danger mt-3" style="display:none;"></div>
        <div class="text-center mt-3">
            没有账号？<a href="register.html">立即注册</a>
        </div>
        <div class="text-center mt-2">
            <a href="index.html">返回首页</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="common.js"></script>
<script>
    var tipEl = document.getElementById('errorTip');
    function showError(msg) {
        tipEl.textContent = msg;
        tipEl.style.display = 'block';
    }
    function hideError() {
        tipEl.style.display = 'none';
    }

    document.getElementById("loginBtn").addEventListener("click", async function(){
        hideError();
        var username = document.getElementById("usernameInput").value.trim();
        var password = document.getElementById("passwordInput").value.trim();

        if(!username || !password){
            showError("请输入账号和密码");
            return;
        }

        try {
            var res = await axios.post("/api/login", {
                username: username,
                password: password
            });

            if(res.data.code === 200){
                saveUser(res.data.data);
                alert("登录成功");
                window.location.href = "index.html";
            } else {
                showError(res.data.msg || "登录失败");
            }
        } catch(e) {
            // 从 axios 拦截器提取的错误消息，或从 response 中提取
            var errMsg = e.userMessage;
            if (!errMsg && e.response && e.response.data && e.response.data.msg) {
                errMsg = e.response.data.msg;
            }
            if (!errMsg) {
                errMsg = "网络错误，请确认后端已启动";
            }
            console.error("登录请求失败:", e);
            showError(errMsg);
        }
    });

    // 回车键快捷登录
    document.getElementById("passwordInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            document.getElementById("loginBtn").click();
        }
    });
</script>
</body>
</html>
